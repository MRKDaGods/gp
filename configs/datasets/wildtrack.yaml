# WILDTRACK - EPFL CVLAB Multi-Camera Pedestrian Dataset
#
# 7 synchronized HD cameras (1920x1080) in an outdoor public area
# Dense annotations at 2 fps, ~400 annotated frames, ~20 people per frame
# Source: https://www.epfl.ch/labs/cvlab/data/data-wildtrack/
#
# Published baselines (papers / leaderboard):
#   MOTA ~= 80-92%    IDF1 ~= 70-85%    HOTA ~= 55-70%
#
# Key characteristics:
#   - Outdoor, variable lighting -> CLAHE useful
#   - Heavy occlusion in crowded scenes
#   - All 7 cameras share heavily overlapping FOV
#   - Annotated at 2 fps (low temporal resolution)

dataset:
  name: "wildtrack"
  type: "mtmc_person"
  root_dir: "data/raw/wildtrack"

  videos_dir: "videos"
  cameras: null  # auto-discover C1..C7

  annotation_format: "wildtrack"  # custom JSON format
  annotations_dir: "annotations_positions"
  ground_truth_dir: "data/raw/wildtrack/manifests/ground_truth"

  camera_transitions: null  # all cameras share overlapping FOV

  target_classes: [0]  # person only
  class_mapping:
    0: "person"

# Pipeline overrides

stage0:
  input_dir: "data/raw/wildtrack/videos"
  output_fps: 2  # WILDTRACK is annotated at 2 fps
  clahe: true
  clahe_clip_limit: 2.0
  time_offsets: {}   # cameras are pre-synchronized
  lossless: false

stage1:
  detector:
    classes: [0]               # person only
    confidence_threshold: 0.55
    conf: ${.confidence_threshold}
    iou_threshold: 0.50
    img_size: 1280             # HD cameras -> larger inference size helps
  tracker:
    algorithm: "botsort"
    track_buffer: 120          # at 2fps, 120 frames = 60s
    track_high_thresh: 0.25   # let BoT-SORT see all detections
    track_low_thresh: 0.10
    new_track_thresh: 0.25    # allow new track creation
    max_age: 120
    max_obs: 460              # give the tracker more observation history
    min_hits: 2
    match_thresh: 0.60
    appearance_thresh: 0.25   # trust appearance more
  min_tracklet_length: 5
  min_tracklet_area: 400       # outdoor, people can be small
  interpolation:
    enabled: true
    max_gap: 30
  intra_merge:
    enabled: true
    max_time_gap: 30.0
    max_iou_distance: 0.65

stage2:
  reid:
    person:
      model_name: "transreid"
      weights_path: "models/reid/person_transreid_vit_base_market1501.pth"
      embedding_dim: 768
      vit_model: "vit_base_patch16_224"
      num_cameras: 6
      clip_normalization: false
      input_size: [256, 128]
    batch_size: 64
    device: "cuda:0"
    half: true
    flip_augment: true
  hsv:
    h_bins: 32
    s_bins: 16
    v_bins: 16
    n_stripes: 3
  pca:
    enabled: true
    n_components: 256
    pca_model_path: "models/reid/pca_transform_person.pkl"
  crop:
    min_area: 400
    padding_ratio: 0.1
    samples_per_tracklet: 16
    min_quality: 0.05
    laplacian_min_var: 20.0
  camera_bn:
    enabled: true

stage4:
  association:
    top_k: 80
    query_expansion:
      enabled: true
      k: 5
      alpha: 5.0
    mutual_nn:
      enabled: true
      top_k_per_query: 8
    reranking:
      enabled: false
      k1: 25
      k2: 8
      lambda_value: 0.35
    temporal_overlap:
      enabled: true
      bonus: 0.15
      max_mean_time: 5.0
      min_ratio: 0.3
    weights:
      appearance: 0.5
      hsv: 0.3
      spatiotemporal: 0.2
      person:
        appearance: 0.65
        hsv: 0.10
        spatiotemporal: 0.25
    spatiotemporal:
      max_time_gap: 15
      min_time_gap: 0
      camera_transitions: null
    graph:
      similarity_threshold: 0.55
      max_component_size: 20
      algorithm: "community_detection"
      louvain_resolution: 1.5
    gallery_expansion:
      enabled: true
      threshold: 0.50
      max_rounds: 3

stage5:
  ground_truth_dir: "data/raw/wildtrack/manifests/ground_truth"
  iou_threshold: 0.5
  metrics: ["HOTA", "MOTA", "IDF1"]
  generate_report: true
  report_format: "html"
  ground_plane_eval:
    enabled: true
    annotations_dir: "data/raw/wildtrack/annotations_positions"
    calibrations_dir: "data/raw/wildtrack/calibrations"
    conf_threshold: 0.25
    match_threshold_cm: 50.0
    nms_radius_cm: 50.0

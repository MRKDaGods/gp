# WILDTRACK — EPFL CVLAB Multi-Camera Pedestrian Dataset
#
# 7 synchronized HD cameras (1920x1080) in an outdoor public area
# Dense annotations at 2 fps, ~400 annotated frames, ~20 people per frame
# Source: https://www.epfl.ch/labs/cvlab/data/data-wildtrack/
#
# Published baselines (papers / leaderboard):
#   MOTA ≈ 80-92%    IDF1 ≈ 70-85%    HOTA ≈ 55-70%
#
# Key characteristics:
#   - Outdoor, variable lighting → CLAHE useful
#   - Heavy occlusion in crowded scenes
#   - All 7 cameras share heavily overlapping FOV
#   - Annotated at 2 fps (low temporal resolution)

dataset:
  name: "wildtrack"
  type: "mtmc_person"
  root_dir: "data/raw/wildtrack"

  videos_dir: "videos"
  cameras: null  # auto-discover C1..C7

  annotation_format: "wildtrack"  # custom JSON format
  annotations_dir: "annotations_positions"
  ground_truth_dir: "data/raw/wildtrack/manifests/ground_truth"

  camera_transitions: null  # all cameras share overlapping FOV

  target_classes: [0]  # person only
  class_mapping:
    0: "person"

# ─── Pipeline overrides ──────────────────────────────────────────────────

stage0:
  input_dir: "data/raw/wildtrack/videos"
  output_fps: 2  # WILDTRACK is annotated at 2 fps
  clahe: true
  clahe_clip_limit: 2.0
  time_offsets: {}   # cameras are pre-synchronized
  lossless: false

stage1:
  detector:
    classes: [0]               # person only
    confidence_threshold: 0.35 # lowered to keep more detections at 2fps
    conf: ${.confidence_threshold}
    iou_threshold: 0.45
    img_size: 1280             # HD cameras → larger inference size helps
  tracker:
    algorithm: "botsort"
    track_buffer: 60           # at 2fps, 60 frames = 30s — very forgiving for occlusion
    track_high_thresh: 0.35    # match new_track_thresh for BotSort high-confidence split
    track_low_thresh: 0.05     # keep low for lost-track recovery
    new_track_thresh: 0.35     # accept tracks sooner at low frame rate
    max_age: 60                # match track_buffer for long low-fps gaps
    max_obs: 65                # slightly above max_age per BaseTracker guidance
    min_hits: 1
    match_thresh: 0.85         # more permissive matching at 2fps
    appearance_thresh: 0.30    # much more tolerant at 2fps
  min_tracklet_length: 2       # keep more short tracklets for later association
  min_tracklet_area: 400       # outdoor, people can be small
  interpolation:
    enabled: true
    max_gap: 20                # at 2fps, 20 frames = 10s max gap
  intra_merge:
    enabled: true
    max_time_gap: 20.0         # wider merge window for low-fps track breaks
    max_iou_distance: 0.75

stage2:
  reid:
    person:
      model_name: "transreid"
      weights_path: "models/reid/person_transreid_vit_base_market1501.pth"
      embedding_dim: 768
      vit_model: "vit_base_patch16_clip_224.openai"
      num_cameras: 6
      clip_normalization: true
      input_size: [256, 128]
    batch_size: 64
    device: "cuda:0"
    half: true
    flip_augment: true
  hsv:
    h_bins: 32
    s_bins: 16
    v_bins: 16
    n_stripes: 3
  pca:
    enabled: true
    n_components: 256
    pca_model_path: "models/reid/pca_transform_person.pkl"
  crop:
    min_area: 400
    padding_ratio: 0.1
    samples_per_tracklet: 16
    min_quality: 0.05
    laplacian_min_var: 20.0
  camera_bn:
    enabled: true

stage4:
  association:
    top_k: 80
    query_expansion:
      enabled: true
      k: 5
      alpha: 1.0
    mutual_nn:
      enabled: true
      top_k_per_query: 8
    reranking:
      enabled: true
      k1: 25
      k2: 8
      lambda_value: 0.35
    weights:
      appearance: 0.5
      hsv: 0.3
      spatiotemporal: 0.2
      person:
        appearance: 0.80       # overlapping FOV → ReID is dominant cue
        hsv: 0.10
        spatiotemporal: 0.10   # all cameras see same location → ST less useful
    spatiotemporal:
      max_time_gap: 15         # overlapping FOV → simultaneous or very fast transitions
      min_time_gap: 0          # overlapping FOV → same-time sightings valid
      camera_transitions: null
    graph:
      similarity_threshold: 0.30   # lowered: allow more cross-camera merging (40 people, 7 cams)
      algorithm: "community_detection"
      louvain_resolution: 1.5      # lowered: coarser clusters → fewer final trajectories
    gallery_expansion:
      enabled: true
      threshold: 0.35              # lowered: absorb more orphan tracklets
      max_rounds: 3                # extra round to catch remaining orphans

stage5:
  ground_truth_dir: "data/raw/wildtrack/manifests/ground_truth"
  iou_threshold: 0.5
  metrics: ["HOTA", "MOTA", "IDF1"]
  generate_report: true
  report_format: "html"
  ground_plane_eval:
    enabled: true
    annotations_dir: "data/raw/wildtrack/annotations_positions"
    calibrations_dir: "data/raw/wildtrack/calibrations"
    conf_threshold: 0.25
    match_threshold_cm: 50.0
    nms_radius_cm: 50.0

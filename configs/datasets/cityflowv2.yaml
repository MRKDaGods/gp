# CityFlowV2 — AI City Challenge 2022 Track 1
# Multi-Camera Multi-Target Vehicle Tracking
#
# 6 cameras across 2 scenes, 960p+ resolution
# Source: https://www.aicitychallenge.org/2022-data-and-evaluation/
#
# Published baselines (AIC 2022 leaderboard):
#   IDF1 ≈ 70-84%    MOTA ≈ 60-78%    HOTA ≈ 50-65%
#
# Key characteristics:
#   - Intersection cameras → vehicles transit between scenes
#   - Significant viewpoint / lighting differences between cameras
#   - Larger objects but high intra-class similarity (same-model cars)

dataset:
  name: "cityflowv2"
  type: "mtmc_vehicle"
  root_dir: "data/raw/cityflowv2"

  videos_dir: null  # videos are in per-camera subfolders (S01_c001/, S01_c002/, ...)
  cameras: null     # auto-discover from directory structure

  annotation_format: "mot"   # CityFlow uses MOT-like gt.txt per camera
  ground_truth_dir: null     # gt.txt lives alongside each video

  camera_transitions: null   # learn from data

  target_classes: [2, 5, 7]  # car, bus, truck — vehicles only
  class_mapping:
    2: "car"
    5: "bus"
    7: "truck"

# ─── Pipeline overrides ──────────────────────────────────────────────────

stage0:
  input_dir: "data/raw/cityflowv2"
  output_fps: 10
  clahe: true
  clahe_clip_limit: 2.5       # intersection cameras can have harsh light
  time_offsets: {}
  lossless: false

stage1:
  detector:
    classes: [2, 5, 7]         # vehicle classes only
    # CRITICAL: track_high_thresh and new_track_thresh MUST match confidence_threshold.
    # BotSort uses track_high_thresh as the split between "high-conf" and "low-conf"
    # detections. Detections below track_high_thresh can only EXTEND existing tracks
    # (secondary matching) — they will NOT start new tracks. Setting confidence_threshold
    # lower than track_high_thresh wastes detections that never help start new tracks.
    #
    # v11: lowered 0.60->0.40 now that ROI masks eliminate off-road false positives.
    # Reference notebooks use 0.25 with ROI masks.
    # v14: lowered 0.40->0.25 — ROI masks are active and working; S02 cameras
    #   lose ~30% of GT vehicles at 0.40 (small/distant vehicles at intersections).
    confidence_threshold: 0.25  # v14: 0.25 (was 0.40) — matches reference; ROI masks handle FP
    iou_threshold: 0.65        # v4: raised 0.45->0.65 — S02 intersection cameras have dense vehicle overlap;
                               # 0.45 NMS suppresses genuine detections when IoU with neighbours is 0.45-0.65.
    agnostic_nms: true         # class-agnostic NMS: prevents bus/truck from suppressing partially-overlapping cars
    img_size: 1280             # high-res traffic camera footage
  tracker:
    algorithm: "botsort"
    track_buffer: 450          # THE actual death timer: max_time_lost = int(frame_rate/30 * track_buffer).
                               # With frame_rate=30 (BotSort default): max_time_lost = 450 frames = 45s at 10fps.
                               # Red-light stops in S02 last 20-60s → need ≥ 300 frames.
                               # Default=30 → 30 frames = 3s at 10fps (kills all stopped vehicles!).
    max_age: 450               # BaseTracker observation buffer sizing: must be set ≥ track_buffer
                               # to avoid max_obs being auto-bumped incorrectly. BaseTracker does NOT
                               # control the BotSort kill timer (only max_time_lost does).
    max_obs: 460               # Observation history. Must be > max_age + 5 per BaseTracker docs.
    min_hits: 3                # v5: 3 (was 1) — require 3 consecutive detections to confirm track
    track_high_thresh: 0.25    # v14: lowered from 0.40 to match confidence_threshold=0.25
    track_low_thresh: 0.05     # accept very weak dets for secondary (lost track) recovery
    match_thresh: 0.85
    appearance_thresh: 0.5
    new_track_thresh: 0.25     # v14: lowered from 0.40 to match confidence_threshold=0.25
    cmc_method: "sof"          # sparse optical flow CMC (lighter than ECC for mostly-static cameras)
  roi:
    enabled: true              # v11: load roi.jpg masks from camera dirs to eliminate non-road FPs
  min_tracklet_length: 3       # v14: 3 (was 5) — min_hits=3 in tracker already ensures 3 consecutive
                               #   detections before confirm; keeping length >= min_hits recovers
                               #   short GT tracks on S02 cameras (c008 median=12f, many 3-5f tracks)
  min_tracklet_area: 800       # vehicles are large
  interpolation:
    enabled: true
    max_gap: 30
  intra_merge:
    enabled: true
    max_time_gap: 25.0   # v4: raised 10→25 s — vehicles at intersections can stop for a full light cycle
                         # before the fragment from the same vehicle re-enters the detection zone.
    max_iou_distance: 0.7

stage2:
  reid:
    vehicle:
      model_name: "transreid"
      # v13 model: fine-tuned on CityFlowV2, 59 cameras, 256×256 input
      weights_path: "models/reid/transreid_cityflowv2_best.pth"
      weights_fallback: "models/reid/transreid_veri_best.pth"
      embedding_dim: 768
      input_size: [256, 256]
      vit_model: "vit_base_patch16_clip_224.openai"
      num_cameras: 59   # trained on 59 cameras; SIE pads extra cameras to zero
      clip_normalization: true
    batch_size: 64
    device: "cuda:0"
    half: true
    flip_augment: true
    color_augment: true  # v11: brightness/contrast TTA for robustness
    # Ensemble ReID: second model provides complementary features.
    # Both embeddings are L2-normalized then concatenated before PCA whitening.
    # OSNet-x1.0 (VeRi-776): captures fine-grained vehicle color/texture patterns
    # that complement TransReID's global shape representation.
    vehicle2:
      enabled: true
      model_name: "osnet_x1_0"
      weights_path: "models/reid/vehicle_osnet_veri776.pth"
      embedding_dim: 512
      input_size: [256, 128]   # OSNet standard input
      clip_normalization: false  # OSNet uses ImageNet normalization
  hsv:
    h_bins: 32
    s_bins: 16
    v_bins: 16
    n_stripes: 3               # front/middle/rear for vehicles
  pca:
    enabled: true              # PCA whitening on ensemble (TransReID 768D + OSNet 512D = 1280D → 256D)
    n_components: 256          # safe below expected tracklet count (~500-800 with v4 lower thresholds)
    pca_model_path: "models/reid/pca_transform_ensemble.pkl"  # separate path to avoid cache collision
  crop:
    min_area: 800
    padding_ratio: 0.05        # tighter crops for vehicles
    samples_per_tracklet: 20
    min_quality: 0.05
    laplacian_min_var: 30.0
  camera_bn:
    enabled: true

stage4:
  association:
    top_k: 100
    # Exhaustive cross-camera pair generation: compute ALL cross-camera pairwise
    # cosine similarities instead of relying on FAISS top-K retrieval.
    # SOTA practice for MTMC with <2000 tracklets — no missed matches from top-K truncation.
    exhaustive_cross_camera: true
    exhaustive_min_similarity: 0.0
    query_expansion:
      enabled: true
      k: 7
      # alpha controls original embedding weight: orig_weight = alpha / (alpha + k_valid)
      # alpha=1.0 → 16.7% original (over-smoothed); alpha=5.0 → 50% (Radenović et al. standard)
      alpha: 5.0
      # DBA: rebuild FAISS index with expanded embeddings for symmetric retrieval.
      # Ensures expanded queries search an expanded gallery, not the original vectors.
      dba: true
    mutual_nn:
      enabled: true
      top_k_per_query: 10
    reranking:
      enabled: false    # k-reciprocal reranking amplifies noise with many similar-coloured vehicles; raw TransReID similarity is more discriminative
    weights:
      appearance: 0.5
      hsv: 0.3
      spatiotemporal: 0.2
      length_weight_power: 0.5  # v11: length-weighted similarity (SOTA technique)
      vehicle:
        appearance: 0.70       # TransReID has excellent cross-cam discriminability; down-weight noisy cues
        hsv: 0.025             # v11: lowered from 0.05 — HSV causes FP for same-coloured vehicles (reference uses 0.025)
        spatiotemporal: 0.275  # v11: adjusted to keep sum=1.0 after HSV reduction
    spatiotemporal:
      max_time_gap: 300        # vehicles transition within 5 min within a scene
      min_time_gap: 0          # allow overlapping camera views
      # Empirically calibrated from CityFlowV2 GT annotation timing.
      # All cameras share overlapping FOVs → min_time=0 for all pairs.
      # max_time = 1.6x observed max (robustness buffer).
      # mean/std computed from the actual gap distribution (N≥46 shared vehicles per pair).
      # S01 ↔ S02 cross-scene pairs are intentionally absent (different locations).
      camera_transitions:
        S01_c001: {S01_c002: {min_time: 0, max_time: 20, mean_time: 1.9, std_time: 3.4},
                   S01_c003: {min_time: 0, max_time:  5, mean_time: 0.5, std_time: 0.9}}
        S01_c002: {S01_c001: {min_time: 0, max_time: 20, mean_time: 1.9, std_time: 3.4},
                   S01_c003: {min_time: 0, max_time: 20, mean_time: 1.4, std_time: 3.1}}
        S01_c003: {S01_c001: {min_time: 0, max_time:  5, mean_time: 0.5, std_time: 0.9},
                   S01_c002: {min_time: 0, max_time: 20, mean_time: 1.4, std_time: 3.1}}
        S02_c006: {S02_c007: {min_time: 0, max_time: 25, mean_time: 0.9, std_time: 2.6},
                   S02_c008: {min_time: 0, max_time: 30, mean_time: 8.1, std_time: 6.2}}
        S02_c007: {S02_c006: {min_time: 0, max_time: 25, mean_time: 0.9, std_time: 2.6},
                   S02_c008: {min_time: 0, max_time: 20, mean_time: 5.8, std_time: 5.1}}
        S02_c008: {S02_c006: {min_time: 0, max_time: 30, mean_time: 8.1, std_time: 6.2},
                   S02_c007: {min_time: 0, max_time: 20, mean_time: 5.8, std_time: 5.1}}
    graph:
      similarity_threshold: 0.55  # v11: raised from 0.50 to 0.55 (reference value — higher precision)
      algorithm: "connected_components"  # v11: switched from community_detection (Louvain) — deterministic, no resolution parameter
      louvain_resolution: 0.70     # v5: kept for fallback if switching back to Louvain
      louvain_seed: 42             # deterministic community detection
      bridge_prune_margin: 0.05    # v11: remove weak bridge edges (SOTA technique from reference)
      max_component_size: 12       # v11: cap cluster size to prevent runaway merges
    gallery_expansion:
      enabled: true
      threshold: 0.40             # orphan→cluster threshold
      max_rounds: 3
      # Second pass: link orphan↔orphan pairs at a lower threshold.
      # Catches medium-confidence cross-camera pairs that missed the main
      # graph threshold (0.45) but still have discriminative appearance.
      orphan_match_threshold: 0.30
    # Camera-aware distance bias (Liu et al. AIC21 technique):
    # learns per-camera-pair similarity offset from initial clusters,
    # then re-clusters with bias-corrected scores.
    camera_bias:
      enabled: true
      iterations: 1   # 1 iteration = optimal; 2 iterations over-corrects with exhaustive pairs

stage5:
  ground_truth_dir: "data/raw/cityflowv2"  # gt.txt files alongside videos
  iou_threshold: 0.5
  metrics: ["HOTA", "MOTA", "IDF1"]
  generate_report: true
  report_format: "html"
  # CityFlowV2 GT annotates 240 vehicles total: 211 multi-cam + 29 single-cam.
  # AIC protocol: only cross-camera trajectories are meaningful for MTMC eval.
  # Single-cam singletons are guaranteed FP (3-5x more predictions than GT).
  # Dropping them loses 29/240 = 12% GT vehicles but eliminates massive FP flood.
  mtmc_only_submission: true
  # --- Non-GT stationary vehicle filter ---
  # Removes trajectories where ALL tracklets have near-zero displacement.
  # Parked cars produce long-lived detections → guaranteed FP in MTMC eval.
  # No GT information used — purely motion-based.
  stationary_filter:
    enabled: true
    min_displacement_px: 50   # minimum pixel displacement to consider "moving"
  # --- Track smoothing (Savitzky-Golay) ---
  # Smooths bbox trajectories to reduce detection jitter → better IoU with GT.
  # AIC21 1st place used post-trajectory smoothing for +1-2% IDF1.
  track_smoothing:
    enabled: true
    window: 7        # Savitzky-Golay window (must be odd, ≥ polyorder+2)
    polyorder: 2     # polynomial order (2=quadratic, smooth but preserves turns)
  # --- GT-assisted post-processing (DISABLED for fair SOTA comparison) ---
  # These use test-time GT to filter predictions, which inflates metrics vs.
  # a blind AIC server submission (SOTA 84.1% achieved WITHOUT these filters).
  # Enable only for debugging / upper-bound analysis.
  gt_zone_filter: false       # was: true — kept pred tracks overlapping ≥1 GT box
  gt_zone_margin_frac: 0.20
  gt_frame_clip: false        # was: true — dropped pred rows outside GT annotation window
  gt_frame_clip_min_iou: 0.40

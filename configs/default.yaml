project:
  name: "mtmc-tracker"
  output_dir: "data/outputs"
  run_name: null  # auto-generated as run_YYYYMMDD_HHMMSS if null
  log_level: "INFO"

stage0:
  input_dir: "data/raw/cityflowv2"
  video_extensions: [".mp4", ".avi", ".mkv", ".mov"]
  output_fps: 10
  target_size: null  # [width, height] or null to keep original
  normalize: false
  denoise: false
  denoise_strength: 3  # bilateral filter d parameter
  # --- NEW: CLAHE contrast enhancement ---
  clahe: true
  clahe_clip_limit: 2.0
  # --- NEW: per-camera time offsets for synchronisation (seconds) ---
  time_offsets: {}   # e.g. {"cam01": 0.0, "cam02": -0.5, "cam03": 1.2}
  # --- NEW: lossless frame output (PNG instead of JPEG) ---
  lossless: false

stage1:
  detector:
    model: "yolo26m.pt"
    confidence_threshold: 0.25
    iou_threshold: 0.65        # raised for dense vehicle overlap at intersections
    classes: [2, 5, 7]         # COCO: car=2, bus=5, truck=7 (vehicles only)
    device: "cuda:0"
    half: true
    img_size: 1280             # high-res traffic camera footage
    agnostic_nms: true         # prevents bus/truck from suppressing overlapping cars
  tracker:
    algorithm: "botsort"  # botsort | deepocsort | strongsort | bytetrack | ocsort
    reid_weights: "models/tracker/osnet_x0_25_msmt17.pt"
    device: "cuda:0"
    half: true
    track_high_thresh: 0.25    # MUST match confidence_threshold per BotSort docs
    track_low_thresh: 0.05     # accept very weak dets for lost track recovery
    new_track_thresh: 0.25     # MUST match confidence_threshold per BotSort docs
    track_buffer: 450          # death timer: keeps stopped vehicles alive during red lights (20-60s)
    max_age: 450               # must be >= track_buffer for BaseTracker buffer sizing
    max_obs: 460               # must be > max_age + 5 per BaseTracker docs
    min_hits: 3                # require 3 consecutive detections to confirm track
    match_thresh: 0.85
    appearance_thresh: 0.5
    proximity_thresh: 0.5
    cmc_method: "sof"          # sparse optical flow CMC for mostly-static cameras
  min_tracklet_length: 3  # min_hits=3 already ensures 3 consecutive detections
  min_tracklet_area: 800  # vehicles are larger than persons
  # --- NEW: bbox interpolation for detection gaps ---
  interpolation:
    enabled: true
    max_gap: 30              # max frames to interpolate across
  # --- NEW: intra-camera tracklet merging ---
  intra_merge:
    enabled: true
    max_time_gap: 25.0       # raised: vehicles at intersections stop for full light cycles
    max_iou_distance: 0.7    # max 1-IoU distance for merging

stage2:
  reid:
    person:
      model_name: "transreid"
      weights_path: "models/reid/person_transreid_vit_base_market1501.pth"
      embedding_dim: 768
      input_size: [256, 128]  # [H, W] — matches NB07 training
      vit_model: "vit_base_patch16_clip_224.openai"
      num_cameras: 20
      clip_normalization: true
    vehicle:
      model_name: "transreid"
      weights_path: "models/reid/transreid_cityflowv2_best.pth"
      weights_fallback: "models/reid/vehicle_transreid_vit_base_veri776.pth"
      embedding_dim: 768
      input_size: [256, 256]  # [H, W] — matches CityFlowV2 fine-tuning
      vit_model: "vit_base_patch16_clip_224.openai"
      num_cameras: 59   # CityFlowV2 training used 59 cameras; SIE pads
      clip_normalization: true
      # SIE camera ID mapping: DISABLED — SIE hurts because training camera IDs
      # don't correspond to test camera viewpoints (IDF1 dropped 0.777→0.699)
      sie_camera_map: {}
    vehicle2:
      enabled: false  # v26: tested ensemble TransReID+OSNet, hurt MTMC -1.6pp (0.685->0.669)
      save_separate: true  # Save to embeddings_secondary.npy for stage4 fusion (preferred)
      model_name: "osnet_x1_0"
      weights_path: "models/reid/vehicle_osnet_veri776.pth"
      embedding_dim: 512
      input_size: [256, 128]
      clip_normalization: false
    batch_size: 64
    device: "cuda:0"
    half: true
    # --- NEW: flip augmentation at inference ---
    flip_augment: true
    # --- Quality-weighted attention temperature for crop aggregation ---
    # Higher = sharper (more weight on best crops). 0 = uniform averaging.
    quality_temperature: 3.0
    # --- Color brightness augmentation (inference TTA) ---
    color_augment: false  # v27: tested, neutral-to-harmful
    # --- Multi-scale TTA: extract at multiple input sizes and average ---
    # Each entry is [H, W]. Empty list = disabled (use only input_size).
    # For TransReID vehicle (256x256): try [[224, 224], [288, 288]] for ±1 patch row/col.
    multiscale_sizes: []  # disabled by default; enable on Kaggle P100
  hsv:
    h_bins: 32         # increased from 16 for better colour discrimination
    s_bins: 16         # increased from 8
    v_bins: 16         # increased from 8
    n_stripes: 3       # spatial: 3 horizontal stripes (head/torso/legs)
  pca:
    enabled: true
    n_components: 280  # v30: 768 → 280 PCA whitening (optimal dim, IDF1=0.795)
    pca_model_path: "models/reid/pca_transform.pkl"
  crop:
    min_area: 500
    padding_ratio: 0.1
    samples_per_tracklet: 16
    min_quality: 0.05       # composite quality threshold [0, 1]
    laplacian_min_var: 30.0   # Laplacian-variance blur filter (0 = disabled)
  # --- NEW: camera-aware batch normalisation ---
  camera_bn:
    enabled: true
  # --- NEW: power normalization (compress magnitudes before PCA) ---
  # alpha > 0 enables; typical values: 0.3-0.5. 0 = disabled.
  power_norm:
    alpha: 0.0

stage3:
  faiss:
    index_type: "flat_ip"  # inner product on L2-normed = cosine similarity
  metadata:
    db_path: null  # auto-set to output_dir/stage3/metadata.db

stage4:
  association:
    top_k: 100
    # --- Secondary embedding fusion (e.g., OSNet + TransReID ensemble) ---
    secondary_embeddings:
      path: ""       # path to secondary .npy file; empty = disabled
      weight: 0.3    # blending weight for secondary model (0.3 = 30% secondary, 70% primary)
    # --- FIC: per-camera feature whitening (AIC21 1st-place technique) ---
    fic:
      enabled: true
      regularisation: 0.3  # v30: optimal for 280D PCA (was 3.0 for 512D)
      min_samples: 5
    # --- FAC: cross-camera feature augmentation (AIC21 technique) ---
    fac:
      enabled: false  # v26: harmful with 512D PCA (-2.5pp IDF1, -2.3pp MTMC)
      knn: 20
      learning_rate: 0.5
      beta: 0.08
      epochs: 1  # AIC21 uses 2-3 epochs for iterative refinement
    # --- Average Query Expansion (from gp-stage-2 analysis) ---
    query_expansion:
      enabled: true
      k: 5        # average with top-5 nearest neighbours
      alpha: 5.0  # v25: Radenovic standard (50% original at k=5)
    # --- Exhaustive cross-camera pairwise cosine (SOTA practice) ---
    exhaustive_cross_camera: true
    exhaustive_min_similarity: 0.10  # v25: AIC21 SOTA uses 0.1 (SCORE_THR)
    # --- Mutual nearest-neighbour filter ---
    mutual_nn:
      enabled: true
      top_k_per_query: 20
    reranking:
      enabled: false     # v25: disabled — hurts vehicles with 512D PCA (compresses similarity range)
      k1: 30           # broader neighbourhood for CLIP embeddings
      k2: 10           # deeper expansion
      lambda_value: 0.4  # blend: 60% Jaccard + 40% original cosine
    weights:
      appearance: 0.55
      hsv: 0.25
      spatiotemporal: 0.20
      # --- Per-class weight overrides (SOTA TransReID CLIP) ---
      person:
        appearance: 0.70   # TransReID CLIP person: mAP 90.5% — very strong
        hsv: 0.05          # clothing colour less reliable across cameras
        spatiotemporal: 0.25
      vehicle:
        appearance: 0.75   # TransReID CLIP vehicle: dominant signal
        hsv: 0.00          # HSV hurts — removed after ablation sweep
        spatiotemporal: 0.25
      length_weight_power: 0.3  # mild preference for longer tracklets
    spatiotemporal:
      max_time_gap: 300  # seconds
      min_time_gap: 0    # allow overlapping-FOV camera pairs (CityFlowV2)
      # Per-pair learned priors from CityFlowV2 GT annotation timing.
      # S01↔S02 cross-scene pairs intentionally absent → blocked.
      camera_transitions:
        S01_c001: {S01_c002: {min_time: 0, max_time: 20, mean_time: 1.9, std_time: 3.4},
                   S01_c003: {min_time: 0, max_time:  5, mean_time: 0.5, std_time: 0.9}}
        S01_c002: {S01_c001: {min_time: 0, max_time: 20, mean_time: 1.9, std_time: 3.4},
                   S01_c003: {min_time: 0, max_time: 20, mean_time: 1.4, std_time: 3.1}}
        S01_c003: {S01_c001: {min_time: 0, max_time:  5, mean_time: 0.5, std_time: 0.9},
                   S01_c002: {min_time: 0, max_time: 20, mean_time: 1.4, std_time: 3.1}}
        S02_c006: {S02_c007: {min_time: 0, max_time: 25, mean_time: 0.9, std_time: 2.6},
                   S02_c008: {min_time: 0, max_time: 30, mean_time: 8.1, std_time: 6.2}}
        S02_c007: {S02_c006: {min_time: 0, max_time: 25, mean_time: 0.9, std_time: 2.6},
                   S02_c008: {min_time: 0, max_time: 20, mean_time: 5.8, std_time: 5.1}}
        S02_c008: {S02_c006: {min_time: 0, max_time: 30, mean_time: 8.1, std_time: 6.2},
                   S02_c007: {min_time: 0, max_time: 20, mean_time: 5.8, std_time: 5.1}}
    graph:
      similarity_threshold: 0.60  # v30: optimal for 280D PCA whitened embeddings
      algorithm: "conflict_free_cc"  # v28: conflict-aware greedy matching prevents false transitive chains
      louvain_resolution: 1.0  # balanced: 1.5 over-fragments, 0.8 under-segments
      bridge_prune_margin: 0.0  # v27: no bridge pruning yields best MTMC (+1.4pp)
      max_component_size: 12    # v25: tighter cap to prevent runaway merges
    # --- Reciprocal best-match seeding (SOTA threshold-free technique) ---
    # For each tracklet, finds its best match in each other camera.
    # If two tracklets mutually agree they're each other's best match,
    # they're linked even if below the graph threshold.  Rank-based,
    # works despite compressed similarity distributions.
    reciprocal_best_match:
      enabled: false  # v27: hurts MTMC badly (0.684→0.665, IDSw 33→208)
      min_similarity: 0.20   # absolute floor (prevent garbage links)
    # --- Iterative gallery expansion for orphan tracklets (legacy, disabled when hierarchical is on) ---
    gallery_expansion:
      enabled: true
      threshold: 0.50    # v30: optimal for 280D PCA
      max_rounds: 2
      orphan_match_threshold: 0.40  # v30: raised for 280D PCA
    # --- Temporal overlap bonus for overlapping-FOV cameras ---
    # When tracklets co-exist in time across cameras with overlapping FOV,
    # this is a strong positive signal (same vehicle visible simultaneously).
    temporal_overlap:
      enabled: true
      bonus: 0.05            # additive bonus to combined score, scaled by temporal overlap ratio
      max_mean_time: 5.0     # only apply to camera pairs with mean transit time < this (seconds)
    # --- Hierarchical centroid-based expansion (AIC21/22 SOTA) ---
    # Multi-pass matching using cluster centroids for more robust merging.
    # Replaces gallery_expansion when enabled.
    hierarchical:
      enabled: false
      centroid_threshold: 0.35  # orphan → cluster centroid similarity threshold
      merge_threshold: 0.35    # cluster ↔ cluster centroid similarity threshold
      orphan_threshold: 0.30   # orphan ↔ orphan cosine threshold (final pass)
      max_merge_size: 12       # prevent oversized clusters
    # --- Camera-aware distance bias (AIC21 technique) ---
    camera_bias:
      enabled: false  # v30: hurts with 280D PCA (-0.7pp)
      iterations: 1
    # --- Zone-based transition scoring (AIC21/22 SOTA) ---
    zone_model:
      enabled: false  # v30: neutral/harmful with 280D PCA
      zone_data_path: "configs/datasets/cityflowv2_zones.json"
      min_count: 2       # minimum GT count for valid transition
      bonus: 0.03        # similarity bonus for valid zone transition
      penalty: 0.03      # similarity penalty for invalid zone transition
    # --- Per-camera-pair similarity boost (targeted threshold lowering) ---
    # Boosts for hard pairs with high TP / low FP ratio (from diagnostic).
    camera_pair_boost:
      enabled: false  # v30: hurts with 280D PCA
      boosts:
        S02_c006-S02_c008: 0.08  # 38 TP below threshold, 0 FP above — safe to boost
        S01_c001-S01_c003: 0.04  # 15 TP below, 1 FP above — moderate boost
        S01_c002-S01_c003: 0.04  # 6 TP below, 0 FP above

stage5:
  evaluator: "trackeval"  # trackeval | pymotmetrics
  ground_truth_dir: null  # set per dataset
  metrics: ["HOTA", "MOTA", "IDF1"]
  iou_threshold: 0.5
  generate_report: true
  report_format: "html"  # html | markdown

stage6:
  video:
    enabled: true
    draw_bboxes: true
    draw_ids: true
    draw_trails: true
    trail_length: 30
    output_fps: 10
    codec: "mp4v"
    colors_by: "global_id"  # global_id | class
  bev:
    enabled: false
    map_image: null
    scale: 1.0
  timeline:
    enabled: true
  export:
    formats: ["json", "csv"]

apps:
  dashboard:
    host: "localhost"
    port: 8501
  nl_query:
    model: "all-MiniLM-L6-v2"
    top_k: 10
  simulation_3d:
    enabled: true
    backend: "plotly"  # plotly | pydeck

project:
  name: "mtmc-tracker"
  output_dir: "data/outputs"
  run_name: null  # auto-generated as run_YYYYMMDD_HHMMSS if null
  log_level: "INFO"

stage0:
  input_dir: "data/raw/cityflowv2"
  video_extensions: [".mp4", ".avi", ".mkv", ".mov"]
  output_fps: 10
  target_size: null  # [width, height] or null to keep original
  normalize: false
  denoise: false
  denoise_strength: 3  # bilateral filter d parameter
  # --- NEW: CLAHE contrast enhancement ---
  clahe: true
  clahe_clip_limit: 2.0
  # --- NEW: per-camera time offsets for synchronisation (seconds) ---
  time_offsets: {}   # e.g. {"cam01": 0.0, "cam02": -0.5, "cam03": 1.2}
  # --- NEW: lossless frame output (PNG instead of JPEG) ---
  lossless: false

stage1:
  detector:
    model: "yolo26m.pt"
    confidence_threshold: 0.25
    iou_threshold: 0.45
    classes: [0, 2, 5, 7]  # COCO: person=0, car=2, bus=5, truck=7
    device: "cuda:0"
    half: true
    img_size: 640
  tracker:
    algorithm: "botsort"  # botsort | deepocsort | strongsort | bytetrack | ocsort
    reid_weights: "models/tracker/osnet_x0_25_msmt17.pt"
    device: "cuda:0"
    half: true
    track_high_thresh: 0.3     # lowered: accept more detections for association
    track_low_thresh: 0.1
    new_track_thresh: 0.4      # lowered: create tracks from lower-confidence detections
    track_buffer: 60           # increased: keep lost tracks alive longer (crucial at low fps)
    match_thresh: 0.85
    appearance_thresh: 0.5     # increased: tolerate larger appearance changes (turning, etc)
    proximity_thresh: 0.5
  min_tracklet_length: 5  # minimum frames for a valid tracklet
  min_tracklet_area: 500  # minimum bbox area in pixels
  # --- NEW: bbox interpolation for detection gaps ---
  interpolation:
    enabled: true
    max_gap: 30              # max frames to interpolate across
  # --- NEW: intra-camera tracklet merging ---
  intra_merge:
    enabled: true
    max_time_gap: 5.0        # seconds between tracklet end and next start
    max_iou_distance: 0.7    # max 1-IoU distance for merging

stage2:
  reid:
    person:
      model_name: "resnet50_ibn_a"
      weights_path: "models/reid/person_resnet50ibn_market1501.pth"
      embedding_dim: 2048
      input_size: [256, 128]  # [H, W]
    vehicle:
      model_name: "transreid"
      weights_path: "models/reid/vehicle_transreid_clip_veri776.pth"
      embedding_dim: 768
      input_size: [224, 224]  # [H, W]
      vit_model: "vit_base_patch16_clip_224.openai"
      num_cameras: 20
      clip_normalization: true
    batch_size: 64
    device: "cuda:0"
    half: true
    # --- NEW: flip augmentation at inference ---
    flip_augment: true
  hsv:
    h_bins: 32         # increased from 16 for better colour discrimination
    s_bins: 16         # increased from 8
    v_bins: 16         # increased from 8
    n_stripes: 3       # spatial: 3 horizontal stripes (head/torso/legs)
  pca:
    enabled: true
    n_components: 512
    pca_model_path: "models/reid/pca_transform.pkl"
  crop:
    min_area: 500
    padding_ratio: 0.1
    samples_per_tracklet: 16
    min_quality: 0.05       # composite quality threshold [0, 1]
    laplacian_min_var: 30.0   # Laplacian-variance blur filter (0 = disabled)
  # --- NEW: camera-aware batch normalisation ---
  camera_bn:
    enabled: true

stage3:
  faiss:
    index_type: "flat_ip"  # inner product on L2-normed = cosine similarity
  metadata:
    db_path: null  # auto-set to output_dir/stage3/metadata.db

stage4:
  association:
    top_k: 100
    # --- Average Query Expansion (from gp-stage-2 analysis) ---
    query_expansion:
      enabled: true
      k: 5        # average with top-5 nearest neighbours
      alpha: 1.0  # weight for original embedding (1.0 = uniform averaging)
    # --- Mutual nearest-neighbour filter ---
    mutual_nn:
      enabled: true
      top_k_per_query: 10
    reranking:
      enabled: true
      k1: 25           # tuned up from 20 (broader neighbourhood)
      k2: 8            # tuned up from 6  (deeper expansion)
      lambda_value: 0.35  # tuned up from 0.3 (slightly more original sim)
    weights:
      appearance: 0.5
      hsv: 0.3
      spatiotemporal: 0.2
      # --- NEW: per-class weight overrides ---
      person:
        appearance: 0.65
        hsv: 0.10
        spatiotemporal: 0.25
      vehicle:
        appearance: 0.50
        hsv: 0.25
        spatiotemporal: 0.25
    spatiotemporal:
      max_time_gap: 300  # seconds
      min_time_gap: 2    # seconds
      camera_transitions: null  # loaded from dataset config if available
    graph:
      similarity_threshold: 0.45
      algorithm: "community_detection"  # connected_components | community_detection
      louvain_resolution: 1.5  # higher = more granular clusters
    # --- NEW: iterative gallery expansion for orphan tracklets ---
    gallery_expansion:
      enabled: true
      threshold: 0.5     # min cosine sim to absorb an orphan
      max_rounds: 2

stage5:
  evaluator: "trackeval"  # trackeval | pymotmetrics
  ground_truth_dir: null  # set per dataset
  metrics: ["HOTA", "MOTA", "IDF1"]
  iou_threshold: 0.5
  generate_report: true
  report_format: "html"  # html | markdown

stage6:
  video:
    enabled: true
    draw_bboxes: true
    draw_ids: true
    draw_trails: true
    trail_length: 30
    output_fps: 10
    codec: "mp4v"
    colors_by: "global_id"  # global_id | class
  bev:
    enabled: false
    map_image: null
    scale: 1.0
  timeline:
    enabled: true
  export:
    formats: ["json", "csv"]

apps:
  dashboard:
    host: "localhost"
    port: 8501
  nl_query:
    model: "all-MiniLM-L6-v2"
    top_k: 10
  simulation_3d:
    enabled: true
    backend: "plotly"  # plotly | pydeck

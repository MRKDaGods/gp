<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geospatially Constrained Search Animation</title>
    <link rel="stylesheet" href="heatmap-anim.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Geospatially Constrained Tracking Search</h1>
            <p>Watch how the system expands its search radius to locate the suspect across multiple cameras</p>
        </div>

        <!-- Map container: holds the background map image and all overlays (radar, cameras, route) -->
        <div id="map-container" class="map-container">
            <!-- SVG layer for radar rings and route line -->
            <svg id="overlay-svg" class="overlay-svg" width="800" height="600"></svg>

            <!-- Cameras container (DOM elements for camera pins) -->
            <div id="cameras-container" class="cameras-container"></div>

            <!-- Text labels container -->
            <div id="labels-container" class="labels-container"></div>

            <!-- Radar center indicator (small dot to show current radar center) -->
            <div id="radar-center" class="radar-center"></div>
        </div>

        <div class="controls">
            <button id="play-btn" class="btn btn-primary">Play Animation</button>
            <button id="reset-btn" class="btn btn-secondary">Reset</button>
            <div class="timeline">
                <div id="progress-bar" class="progress-bar"></div>
            </div>
            <div class="time-display">
                <span id="current-time">0.0s</span> / <span id="total-time">9.0s</span>
            </div>
        </div>
    </div>

    <script src="heatmap-anim.js"></script>
</body>
</html>
